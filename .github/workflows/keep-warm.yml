name: Keep Supabase warm

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          URL: https://uerolgdehjywyjlfqymx.supabase.co
          ANON_KEY: sb_publishable_6N5namgJ3dc2gkux0JHhlA_Z8dRyTQ1
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: $ANON_KEY" \
            "$URL/rest/v1/")
          echo "HTTP $code"
          # Any 2xx/3xx/4xx counts as activity. 5xx means the project is paused or down.
          if [ "$code" -ge 500 ]; then
            echo "::error::Supabase returned $code — project may be paused. Restore at https://supabase.com/dashboard/project/uerolgdehjywyjlfqymx"
            exit 1
          fi
